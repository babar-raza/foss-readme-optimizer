- id: GOV-023
  group: GOV
  priority: P1
  status: GOVERNANCE
  section: 3. Requirements governance
  requirement: 'Before editing any section of `plans/master.md`, an agent MUST state which section(s) it intends to change
    and why, and MUST proceed only on the user''s fresh, explicit, per-instance go-ahead for that specific edit — a standing
    or implied yes from earlier in the session does NOT satisfy this. `logs/` and `plans/requirements.md` are unaffected by
    this gate. **Amended 2026-07-23 (Wave 13.7, decision #44''s own in-place amendment)**: an explicit, task-scoped standing
    directive that names a specific plan/scope to execute and explicitly asks for docs/logs to be kept current DOES satisfy
    the per-instance go-ahead, but only for the routine, append-only class of edit that directive implies -- adding a new
    numbered Decision Ledger entry documenting a wave''s own already-completed, tested, verified work, plus the accompanying
    routine Status/Build-Checklist updates. It does NOT extend to deleting or rewriting an existing decision''s substance,
    restructuring a section, or any edit outside the routine wave-closure pattern -- those still need a fresh, per-instance
    go-ahead. Found and corrected honestly while drafting this very amendment: this session had been appending a Decision
    Ledger entry per wave under exactly such a standing directive without re-asking each time, which the original text read
    as non-compliant if taken literally -- named explicitly per `GOV-008` rather than left a silent, undocumented departure.'
  acceptance_evidence: Session narrative shows the what/why statement and the user's specific go-ahead preceding any `master.md`
    diff that is NOT a routine wave-closure append under an active, named standing directive; no `master.md` edit outside
    that bounded class lands without both.
  traceability_raw: Decision 44; GOVERNANCE.md rule 12; amended Wave 13.7
  decision_refs:
  - '44'
