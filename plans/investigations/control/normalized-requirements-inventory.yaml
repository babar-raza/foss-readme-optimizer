- id: DEP-004
  group: DEP
  priority: P1
  status: IMPLEMENTED
  section: 10. Operational and workflow requirements
  requirement: 'A bounded repository file-tree walk (`inspection/file_inventory.py`''s `_MAX_FILES_SCANNED`-bounded scan)
    MUST reach a deterministic result regardless of which OS/filesystem performs the scan -- the literal named guard: "a runner
    depending on an accidental global environment."'
  acceptance_evidence: '**Found live via this wave''s own `act` proof, not hypothesized**: `os.walk()`''s traversal order
    is filesystem-dependent, never guaranteed -- `test_walk_stops_at_max_files_scanned_bound` passed on the local Windows
    dev machine but failed under a real Linux/Docker `act` run of the identical test, because `d6`''s manifest was reached
    before the 50-file bound tripped under Linux''s own directory-entry order. Fixed in both `os.walk()` call sites (`_find_manifest_paths()`''s
    `_bounded_walk()`, `find_all_manifest_roots()`): `dirs[:] = sorted(...)`/`sorted(files)` makes the walk''s own effective
    order deterministic across every OS, not an accident of the host filesystem. A real, live production-correctness fix (bounded
    manifest discovery on a genuinely oversized repo could otherwise silently miss a real manifest depending on which Linux
    runner happened to scan it), not merely a test-flakiness fix. Proven by the existing `test_walk_stops_at_max_files_scanned_bound`
    (now passing identically on both platforms, confirmed via a second real `act` run) plus a new `test_bound_is_reached_deterministically_regardless_of_os_walk_order`
    (monkeypatches `os.walk` to yield a deliberately reversed order and confirms the bound still trips on the same files regardless
    -- would have failed deterministically pre-fix, since a reversed top-level order visits `d6` first). Proof: `plans/investigations/evidence/level8-semantic-closure-verification.json`
    (`DEP-004`).'
