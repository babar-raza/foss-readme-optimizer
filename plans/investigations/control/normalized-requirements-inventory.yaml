    under the existing push-blocking and allow-list safety properties. At this stage, proving a requirement this way MUST
    NOT itself commit or push anything to the actual product repos. **Amended 2026-07-23 (Wave 13.7, decision #33''s own in-place
    amendment -- the live-proof requirement above is untouched, only the push-approval clause below is revised)**: a real
    write to a managed remote MUST be gated by a valid, unexpired `AuthorizationRecordV1` covering the specific repository/effect-class/branch-pattern
    (`authorization.registry.authorized_for()`, `AUTH-004`), superseding the prior per-instance-synchronous-approval requirement
    as the mechanism that satisfies this gate. No capability may infer authorization from `mode == ''full''` alone or invent
    authority when no record covers it; an out-of-scope action MUST produce a `CapabilityGap`/`blocked_pending_authorization`
    finding instead of either. A human still grants/renews each record asynchronously (a reviewable config change, never a
