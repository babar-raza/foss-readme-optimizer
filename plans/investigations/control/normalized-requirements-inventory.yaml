    rule 9. **Partial progress 2026-07-22** (decision #48, `TC-17`): a real, registered, schema-validated `stop` capability
    (`capabilities/stop.py`) now exists, so a model calling it is telemetrically distinct from an unrecognized/hallucinated
    name -- `supervisor/loop.py` special-cases `capability_id == "stop"` and ends the run the same way an explicit no-tool-call
    turn does, proven by `tests/unit/test_supervisor_loop.py::test_planner_calling_the_real_stop_capability_converges_without_dispatch`.
    This does NOT root-cause or eliminate the hallucination itself (the model can still fail to call `stop` correctly) --
    it only makes the phenomenon observable/measurable, a stated prerequisite for ever tuning a fix (Phase 13 §13.4 Pillar
    A.1) rather than the fix itself. **Further progress 2026-07-22** (`TC-18`, Phase 13 §13.4 Pillar A.2): `supervisor/loop.py`''s
    `NO_PROGRESS_TURN_LIMIT` (3) now ends a run deterministically -- via the same `final_status()` a real stop call already
    reaches -- once a turn''s task result is `SUPERSEDED` (an exact duplicate call, e.g. the hallucination repeating itself)
    or `BLOCKED` (rejected/failed dispatch, including an unrecognized capability name) for 3 consecutive turns, rather than
    burning every remaining turn toward `max_turns`/`repair_exhausted`. Proven by `tests/unit/test_supervisor_loop.py::test_deterministic_backstop_ends_a_run_of_repeated_duplicate_calls_early`
    and `..._of_repeated_unknown_capability_calls_early` (the second confirms the run correctly lands on `PARTIAL_WITH_CAPABILITY_GAP`,
    never `BLOCKED: repair_exhausted`). Deliberately a coarse, honest proxy for "nothing useful left to try" (any 3 consecutive
    non-PASSED turns), not a claim of provable graph exhaustion -- still open: root cause of the hallucination itself, and
    a live before/after proof that this backstop actually fires in a real (not fixture-simulated) recurrence.'
