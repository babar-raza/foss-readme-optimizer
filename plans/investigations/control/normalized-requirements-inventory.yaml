- id: EFF-005
  group: EFF
  priority: P0
  status: IMPLEMENTED
  section: 19. Autonomous runtime and capability requirements
  requirement: A gated effector's terminal `applied` ledger write MUST be preceded by a re-verification that the dispatching
    run still holds the per-`org_repo` lock by holder identity, not wall-clock alone -- a lease that outlived `LOCK_LEASE_SECONDS`
    and was legitimately reclaimed by a second runner must not let the first runner's write dishonestly record sole authorship
    of the effect.
  acceptance_evidence: 'Found by Phase 13''s adversarial machinery audit (F4, decision #46): the lock was acquired once and
    never re-checked before the terminal write, dormant only because the sole existing effector (a fast local git commit)
    could never plausibly outlive a 900s lease -- becomes live and exploitable the moment a slower `remote_write` effector
    (subject to real GitHub secondary-rate-limit backoff) is added. **Built 2026-07-22** (decision #48, `TC-05`): `StateBackend.lock_still_held(lock)`
    (Protocol method, `state/backend.py`), implemented in `state/git_backend.py::GitStateBackend.lock_still_held()` by re-fetching
    the lock ref and comparing `holder_id`; called by `effect_ledger.py::dispatch_gated_effect()` immediately before the terminal
    `applied` write -- on a lost lock, the record is left `pending` (not falsely `applied`), so a future dispatch for the
    same key correctly requires `reconciliation_check()` rather than either runner silently trusting its own bookkeeping.
    Proven by `tests/unit/test_effect_ledger.py::TestDispatchGatedEffectLockRevalidation` (a slow-effector-outlives-its-lease
    scenario, both the reclaimed and not-reclaimed paths) and `tests/unit/test_state_backend.py::TestFakeStateBackendLockRevalidation`.
    Does not prevent the underlying double-dispatch itself (the effector has already run by the time this check fires) --
    only prevents the ledger from dishonestly recording it as exclusively applied; named honestly as such in both implementations''
    own docstrings.'
  traceability_raw: Decision 46/48; Phase 13 §13.1 (F4)
  decision_refs:
  - '46'
  - '48'
  phase_refs:
  - '13'
- id: EFF-006
  group: EFF
  priority: P0
  status: IMPLEMENTED
  section: 19. Autonomous runtime and capability requirements
  requirement: An idempotency key for a `gated_effector` capability that renders README content MUST be sensitive to the rendered
    candidate's own bytes, not only the pre-render upstream baseline -- two different generated candidates against an unchanged
    upstream MUST NOT collide on one key.
  acceptance_evidence: '**Found and fixed same session, 2026-07-23** (Wave 9.6): direct trace confirmed `effect_ledger.py::idempotency_key()`''s
    `fresh_fingerprint` input (`readme/facts.py::compute_tracked_content_hash()`) is computed by `orchestrator.py::prepare_readme_candidate()`
    BEFORE the LLM ever runs -- never a hash of the rendered candidate/`final_text`. Two different generated candidates against
    the same unchanged upstream (`force_regenerate=True` plus ordinary LLM sampling variance, or a repaired candidate after
    a verifier rejection) collided on one key, so the ledger''s own `already_applied` cache hit silently discarded the second,
    newly-verified candidate in favor of the first, stale one. **Fixed**: new `capabilities/effect_identity.py::EffectIdentityV1`
    (`candidate_byte_hash = sha256(final_text)`, reusing `facts_hash` wholesale as `product_facts_hash` rather than re-deriving
    its already-folded-in `policy_content_hash`/`prompt_content_hash`/`GENERATION_SCHEMA_VERSION`/`VALIDATION_RULESET_VERSION`
    components -- naming those again would add no discriminating power `facts_hash` doesn''t already have); `idempotency_key()`
    now hashes this typed identity instead of a plain per-field dict whenever `final_text` is a declared `idempotency_input`
    -- `commit_readme_write.py`/`open_presentation_pr.py` both now declare it. Proven by `tests/unit/test_effect_identity.py`
    and new cases in `tests/unit/test_effect_ledger.py` (`TestCandidateAwareIdempotencyKey`, `TestDispatchGatedEffectCandidateAwareness`):
    two different candidates at identical `org_repo`/`facts_hash`/`fresh_fingerprint` now produce different keys and a real
    second dispatch attempt (not `already_applied`); an identical retry still produces the same key; existing generic-capability
    tests (`org_repo`-only `idempotency_inputs`) are unaffected. **Scope note, verified not assumed**: this fully fixes `commit_readme_write`
    (the local write always applies `final_text` directly to the file); `open_presentation_pr`''s own branch-name dedup (`PRL-001`)
    keys only on `facts_hash`, independent of this fix -- see the new `PRL-009` row for that separate, pre-existing gap this
    fix exposed but does not itself close. Proof: `plans/investigations/evidence/level8-semantic-closure-verification.json`
    (`EFF-006`).'
  traceability_raw: This session's fix; `capabilities/effect_identity.py`; `PRL-009`
  decision_refs: []
  phase_refs: []
