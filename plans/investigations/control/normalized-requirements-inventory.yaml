    from a fixed-length (~5,600-char) source string whose repeat count never scaled with the ladder variable `approx_tok`
    before the trailing slice — a one-line script bug (Python slicing past a string''s actual length is a no-op), not a gateway
    quirk. Every ladder rung from 2k to 96k "approx tokens" actually sent the same ~1,400 real tokens, exactly explaining
    why the original evidence file''s own `usage.prompt_tokens` stayed flat (~1,031–1,032) across the whole ladder. No document
    in this project had validated real large-context behavior before this was found.'
  acceptance_evidence: 'Fixed and re-run live, 2026-07-21 (see `plans/investigations/llm-gateway-context-ceiling-corrected.md`
    for full results): `qwen3-next`''s real, proven-safe ceiling is **~71,069 tokens** (the top rung actually reached), perfect
    needle recall at every real size tested; `gpt-oss` fails needle recall at every real size, including the smallest (~1,494
    tokens) — a size-independent instruction-following weakness, not a context-length one. A new multi-turn conversation-growth
    probe (added this session) measured a realistic dossier-shaped planner turn at 639→686 real tokens across one tool-call
    round trip — three orders of magnitude below the proven ceiling. Any token-budget mechanism (`AGT-008`) must cite these
    corrected numbers, never the original "96k" claim. **Confirmed 2026-07-22**: `plans/master.md`''s own remaining "~96k"
    mentions were already correct (self-corrected in decisions #26/#45); `plans/investigations/full-surface-current-state.md`''s
    L1 summary line was the one remaining stale citation and is now fixed to cite the corrected ~71,069-token ceiling. Proof:
