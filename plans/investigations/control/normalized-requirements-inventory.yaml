- id: AGT-007
  group: AGT
  priority: P0
  status: IMPLEMENTED
  section: 19. Autonomous runtime and capability requirements
  requirement: The planner MUST NOT be able to redirect a dispatch to a repository other than the one the active `supervise_repo()`
    call is for -- `org_repo` is trusted runtime state, never a value the model can supply or override.
  acceptance_evidence: 'Found during the Wave 8 external-review triage (decision 42, 2026-07-21) via direct code read: `supervisor/loop.py`''s
    planner-dispatch path used `arguments.setdefault("org_repo", org_repo)`, which only fills the trusted value when the planner''s
    own tool-call JSON omits one -- a planner-supplied `org_repo` (hallucination, injected content read from a repo, a plain
    model mistake) would silently win instead. Blast radius was bounded even before the fix (every capability still gates
    through `registry.loader.require_listed()`/`is_permitted()`, so a target outside the 25-repo registry was always hard-rejected),
    but within the registry, a run for repo A could get a capability silently dispatched against registry repo B, with results/evidence
    recorded under the wrong run. **Fixed**: `arguments["org_repo"] = org_repo`, an unconditional override, not a default
    -- there is no legitimate reason the general planner should ever select a different repository than the one the active
    call is for (a real multi-repository operation is `AGT-002`''s own named, out-of-scope future concern). `tests/unit/test_supervisor_loop.py::TestOrgRepoTrustBoundary`
    proves a fixture planner supplying a different, unlisted `org_repo` in its own tool-call arguments still dispatches against
    the real active repo, structurally (inspecting the dispatched arguments directly, not just the outcome).'
  traceability_raw: Found and fixed via user direction during the Wave 8 external-review triage; Decision 42
  decision_refs:
  - '42'
  phase_refs: []
