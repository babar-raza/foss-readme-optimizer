    only for a positively-confirmed `NOT_PUBLISHED` outcome -- never for `CAPABILITY_GAP`/`BLOCKED_NETWORK` (couldn''t check)
    or `REGISTRY_VERIFIED`. **The named regression case, proven against real evidence, not a synthetic fixture**: `tests/unit/test_claim_verification.py::TestFindClaimConflictsRealRegression`
    uses the actual README text live-fetched 2026-07-23 from `aspose-cells-foss/Aspose.Cells-FOSS-for-Java`''s own `master`
    branch (confirmed still containing the identical, unresolving `<groupId>org.aspose</groupId><artifactId>aspose-cells-foss</artifactId>`
    dependency block the real PR shipped without correcting) -- `find_claim_conflicts()` correctly produces a finding naming
    the exact false coordinate. 12 tests total, including multi-root isolation (a sibling root''s correct coordinate is never
    flagged) and per-ecosystem coverage (java/python/typescript/net). Read-only, no network of its own -- operates entirely
    on already-computed facts/text.'
