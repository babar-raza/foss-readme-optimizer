- id: SCL-005
  group: SCL
  priority: P2
  status: BACKLOG
  section: 19. Autonomous runtime and capability requirements
  requirement: '`supervisor/loop.py::supervise_repo()` deliberately holds no lock across its own specialist tier (each specialist''s
    own `save_domain()`/`dispatch_gated_effect()` acquires the per-`org_repo` lock only for its own narrow write, to avoid
    self-deadlocking against the supervisor''s own later lock acquisition) — meaning nothing gives the specialist tier as
    a whole run-level mutual exclusion. Found by independent production-reliability review, 2026-07-20: two genuinely concurrent
    invocations against the same `org_repo` (an overlapping manual `workflow_dispatch`, or a `--domain` CLI run alongside
    a full `supervise` run — `commands.py::_cmd_supervise_single_domain`''s own docstring already states it "deliberately
    bypasses the supervisor''s own convergence/lock machinery") can interleave at the specialist level: `cross_surface_validation`''s
    own `backend.load()` can land between two *different* runs'' sibling writes, and `orchestrator._ensure_work_clone()` has
    no locking of its own, so two concurrent renders against the same shared, persistent `work_dir` race at the plain filesystem/git
    level below the effect ledger''s own lock-protected write. Currently low real-world likelihood: both shipped GitHub Actions
    workflows are manual-`workflow_dispatch`-only, not scheduled — risk rises specifically once a `schedule:` trigger is added
    (already a separate, named future step in the workflow file''s own comments). A design decision on whether the specialist
    tier needs its own coarser lock (accepting the self-deadlock risk that narrow per-write locking was built to avoid), or
    whether `--domain` single-domain invocations should be explicitly serialized against a concurrent full `supervise` run
    some other way — plus a live-reproduced concurrency test, not just a reasoned-through scenario.'
  acceptance_evidence: '**Design decision made, 2026-07-21** (production-redesign session, decision 45): a second, coarser,
    run-scoped lock ref (`RUN_LOCK_REF_PREFIX`, reusing the existing CAS/lease/`--force-with-lease` mechanics via ref-prefix-parameterized
    helpers in `state/git_backend.py`), acquired right after the freshness shortcut and before the specialist tier starts
    — a genuinely different git ref than the existing per-`org_repo` lock (`LOCK_REF_PREFIX`, shared across every specialist''s
    own `save_domain()`/`dispatch_gated_effect()` call), so no self-deadlock risk against that existing lock (confirmed: every
    acquisition here is a non-blocking, immediate-return optimistic CAS, not a blocking wait, so there is no literal circular-wait
    deadlock possible either way). **Correction required, found by adversarial review before this was ever built**: the new
    lock''s release path (`try`/`finally`) must explicitly cover **both** the specialist tier''s normal completion path **and**
    the separate `CONVERGED_NO_TRACKED_CHANGE` early-return shortcut (`supervisor/loop.py`, which fires *after* the specialist
    tier but *before* today''s existing top-level lock acquisition, and today acquires no lock at all) — a naive widening
    that covers only the former would leak the new lock for its full ~900s lease on every "upstream changed, nothing tracked
    changed" outcome, plausibly one of the most common outcomes at portfolio scale. **Also added this session, closing the
    risk this row''s own text already predicted** ("risk rises specifically once a `schedule:` trigger is added"): a GitHub
    Actions `concurrency:` group with a *shared* key (`readme-agent-${{ repo_key }}`) across `readme-agent-run.yml`, `readme-agent-supervise.yml`,
    and the new portfolio workflow (`SCL-008`), `cancel-in-progress: false` (queue, never cancel in-flight work) — this closes
    the cross-command (`run` vs `supervise`) race the in-process lock cannot see across separate CI jobs, a second, complementary
    layer, not a duplicate of the in-process fix.'
  traceability_raw: Found during Wave 7 production-reliability independent review, 2026-07-20; design corrected and extended
    2026-07-21, Decision 26/32/41/45; no owning wave assigned yet — logged per Decision 29
