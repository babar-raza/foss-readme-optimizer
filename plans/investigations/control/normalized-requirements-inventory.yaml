  acceptance_evidence: 'Found while fixing `EFF-006` (Wave 9.6, 2026-07-23): the effect ledger no longer hides this case behind
    `already_applied` (a real second `execute()` attempt now happens), but `execute()`''s own pre-push `find_open_pr()` short-circuit
    (`PRL-001`) still finds the existing branch/PR by name alone and returns early -- the same visible outcome as before the
    ledger fix (the stale PR persists), just reached by a different code path, so `EFF-006` does not regress anything here.
    Deliberately not fixed in this pass: out of Wave 9.6''s scope (that phase is about the ledger''s idempotency key, not
    GitHub branch-naming semantics) -- resolving it requires a `PRL-001` design decision (e.g. folding `candidate_byte_hash`
    into the branch name, trading unbounded branch growth across sampling retries for always-fresh content) this session does
    not make unilaterally.'
