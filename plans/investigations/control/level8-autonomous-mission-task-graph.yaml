taskcards:
  - task_id: L8-MISSION-CONTROL-CONSUMER
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Make the locked supervisor consume and persist central mission taskcards
    source_audit_finding: >-
      The selected supervisor has a runtime TaskGraph for repository capabilities but no loader,
      claim transition, durable mission state, continuation consumer, or mission stop evaluator for
      the Level-8 implementation graph.
    audit_classification: final_outcome_blocker
    priority: P0
    lane: mission-control
    owner: readme-agent-supervisor
    status: IN_PROGRESS
    objective: >-
      Extend the existing supervisor, without creating another controller, so it loads this graph,
      validates it, reconciles durable state, claims the next eligible task, and evaluates mission
      completion.
    why_it_matters: >-
      A taskcard file without a consumer is not continuation proof and cannot be the single
      autonomous authority required by the mission.
    allowed_paths:
      - src/readme_agent/supervisor/
      - src/readme_agent/cli.py
      - src/readme_agent/commands.py
      - src/readme_agent/state/
      - tests/unit/
      - docs/architecture.md
      - plans/investigations/control/level8-autonomous-mission-task-graph.yaml
      - plans/investigations/evidence/level8-autonomous-mission-control/
    forbidden_paths:
      - plans/master.md
      - config/authorization/
      - data/products.json
      - runs/*/work/
    dependencies: []
    expected_outputs:
      - Typed mission/taskcard schema with the protocol's required fields and state vocabulary.
      - Escape-safe YAML loader with referential-integrity and cycle validation.
      - Deterministic eligibility, claim, transition, reconciliation, and stop evaluation.
      - A supervise CLI entry that exercises the same supervisor authority.
      - Versioned durable mission-state persistence.
    acceptance_checks:
      - Invalid schemas, dependencies, transitions, and cycles fail closed.
      - Exactly one dependency-ready task is claimed deterministically.
      - Restart reloads the same claim and does not duplicate dispatch.
      - The evaluator refuses mission completion while mandatory work remains.
    verification:
      - Focused unit tests for schema, loader, transitions, selection, and resume.
      - CLI integration test proving task selection and claim.
      - Raw state inspection after a claim and after terminal transition.
    negative_controls:
      - A second mechanism cannot be selected while mechanism_locked is true.
      - A task with unmet dependencies cannot be claimed.
      - CLOSED cannot be reached directly from TODO or READY.
    regression_checks:
      - Existing supervisor task-graph tests.
      - Existing CLI tests.
      - Ruff, format, mypy, and the full non-live pytest suite.
    evidence_requirements:
      - Command log and serialized before/after state.
      - Test results with exact counts.
      - No-change reload proof.
    rollback_or_recovery: >-
      Remove only the new mission-control entry seam and leave the existing repository supervisor
      behavior unchanged; preserve the committed task graph for diagnosis.
    failure_reroute: >-
      Attempt local schema/loader repair, then state-backend integration repair, then a governed
      existing-library or Git-ref recovery path; never activate the rejected cycle mechanism.
    closeout_rules:
      - Implementation exists and all focused checks pass.
      - A real CLI claim is observed in persisted state.
      - An immediate rerun proves no duplicate claim.

  - task_id: L8-REQUIREMENT-TO-TASKCARD-COVERAGE
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Map every mandatory normative requirement into the mission task graph
    source_audit_finding: >-
      plans/requirements.md contains 376 requirement rows, while no central mission task graph
      previously existed.
    audit_classification: not_attempted
    priority: P0
    lane: mission-control
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Add stable, deduplicated taskcards for every mandatory non-deprecated requirement and record
      verified completion without reopening valid evidence.
    why_it_matters: >-
      Mission completion cannot be evaluated if mandatory requirements have no task representation.
    allowed_paths:
      - plans/requirements.md
      - plans/investigations/control/
      - scripts/governance/
      - tests/unit/
    forbidden_paths:
      - plans/master.md
      - config/authorization/
      - data/products.json
    dependencies:
      - L8-MISSION-CONTROL-CONSUMER
    expected_outputs:
      - Requirement-to-taskcard coverage report with no missing mandatory IDs.
      - Stable task IDs and explicit wave/lane ownership.
      - Reopened cards for semantically contradicted closure claims.
    acceptance_checks:
      - Every requirement ID resolves to exactly one primary taskcard.
      - No duplicate or orphan taskcard exists.
      - IMPLEMENTED rows are preserved only when semantic evidence passes.
    verification:
      - Coverage validator.
      - Semantic implementation-truth matrix.
      - Manual inspection of all P0 and P1 exceptions.
    negative_controls:
      - BACKLOG is not silently treated as mandatory accepted scope.
      - DEPRECATED rows do not create executable work.
      - A path-only citation cannot close a P0 or P1 task.
    regression_checks:
      - Existing plan-structure validator.
      - Existing traceability-matrix check mode.
    evidence_requirements:
      - Machine-readable coverage report.
      - Explicit list of reopened and preserved tasks.
    rollback_or_recovery: Regenerate deterministically from the unchanged normative requirements.
    failure_reroute: Repair parser, then malformed rows, then use the existing normalized inventory.
    closeout_rules:
      - Coverage is exactly 100 percent for mandatory requirements.
      - All exceptions are classified and evidenced.

  - task_id: L8-WAVE0-PLAN-TRUTH-RECONCILIATION
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Reconcile the dirty plan candidate into one truthful active Level-8 sequence
    source_audit_finding: >-
      The master, legacy phase checklist, candidate roadmap/status files, requirements, and
      production evidence contradict one another; the master structural edit is separately gated.
    audit_classification: partially_done
    priority: P0
    lane: governance-truth
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Preserve the valuable dirty candidate, establish the Level-8 Waves 0-8 sequence as the sole
      active program, and eliminate status and evidence overclaims after satisfying all edit gates.
    why_it_matters: An autonomous controller cannot safely execute two contradictory active plans.
    allowed_paths:
      - plans/
      - logs/
      - scripts/governance/
      - docs/
    forbidden_paths:
      - config/authorization/
      - data/products.json
      - runs/*/work/
    dependencies:
      - L8-REQUIREMENT-TO-TASKCARD-COVERAGE
    expected_outputs:
      - Approved surgical master amendments.
      - One allowed active roadmap and generated current-status surface.
      - Compact legacy phase summary.
      - Reconciled normative requirement statuses.
    acceptance_checks:
      - No master, requirements, roadmap, status, or evidence contradiction remains.
      - The plan-structure validator passes without new warnings.
      - Every changed closure claim has semantic evidence.
    verification:
      - Plan structure and semantic matrix.
      - Cross-document link and decision coverage checks.
      - Independent diff review.
    negative_controls:
      - No master section is edited without its applicable explicit gate.
      - Existing decision history is preserved in logs.
      - Unrelated dirty content is not discarded.
    regression_checks:
      - Official governance checks.
      - Fresh-clone reproduction after commit.
    evidence_requirements:
      - Before/after conflict inventory.
      - Approval record for each gated master section.
      - Fresh-clone official-check output.
    rollback_or_recovery: Revert only the bounded plan-healing commit after preserving its audit log.
    failure_reroute: >-
      Use requirements and control artifacts for safe independent work while recording the master
      gate as an authority blocker; do not rewrite master implicitly.
    closeout_rules:
      - All Wave 0 exit gates pass.
      - The accepted plan and task graph agree.

  - task_id: L8-WAVE1-CANONICAL-SAFETY-SPINE
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Make supervise the sole production mutation path and eliminate false success
    source_audit_finding: >-
      The legacy generate/run path can still mutate without the independent verifier and large
      supervisor/orchestrator/command modules obscure responsibility boundaries.
    audit_classification: final_outcome_blocker
    priority: P0
    lane: canonical-runtime
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Decompose the runtime seams, route compatibility commands through the same capability,
      authorization, effect-ledger, and verifier spine, and make every required failure fail closed.
    why_it_matters: Level 8 is impossible while any production mutation can bypass verification.
    allowed_paths:
      - src/readme_agent/
      - tests/
      - docs/
      - plans/investigations/evidence/
    forbidden_paths:
      - config/authorization/
      - data/products.json
      - target repository remotes
    dependencies:
      - L8-WAVE0-PLAN-TRUTH-RECONCILIATION
    expected_outputs:
      - Responsibility-sized runtime modules.
      - Compatibility-only legacy commands or common supervised routing.
      - Closed ORC-005 and OPS-010.
      - Explicit unsupported Rust result until support exists.
    acceptance_checks:
      - No required failure exits zero or reports convergence.
      - No mutation bypasses registry, authorization, effect ledger, or verifier.
      - .NET, Python, C++, and Go false-success scenarios fail closed.
    verification:
      - Focused failure-classification tests.
      - Process-descendant cancellation tests.
      - Heterogeneous production-like reproductions.
    negative_controls:
      - Live credentials are removed from offline tests.
      - Compatibility commands cannot acquire write permission independently.
    regression_checks:
      - Full official checks.
      - Existing push-block and allow-list security tests.
    evidence_requirements:
      - Per-ecosystem raw terminal outcomes.
      - Mutation-path inventory showing one production path.
    rollback_or_recovery: Keep compatibility façades read-only if routing parity is not yet proven.
    failure_reroute: Split by module responsibility and close one bypass at a time.
    closeout_rules:
      - All Wave 1 exit gates pass.
      - Independent verifier confirms no alternate mutation route.

  - task_id: L8-WAVE2-RESTARTABLE-ACTIONS-RUNTIME
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Build restartable, deduplicated, fail-closed GitHub Actions lifecycle
    source_audit_finding: >-
      Trigger intake, lifecycle checkpoints, recovery sweeps, retry classes, health aggregation,
      and dead-man monitoring are incomplete or absent.
    audit_classification: partially_done
    priority: P0
    lane: durable-runtime
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Introduce versioned trigger, checkpoint, health, and manifest contracts and prove recovery at
      every lifecycle boundary under the Git-ref state backend.
    why_it_matters: Scheduled autonomy is not credible if accepted work can disappear after a crash.
    allowed_paths:
      - src/readme_agent/
      - tests/
      - .github/workflows/
      - docs/
      - plans/investigations/evidence/
    forbidden_paths:
      - target repository default branches
      - config/authorization/
    dependencies:
      - L8-WAVE1-CANONICAL-SAFETY-SPINE
    expected_outputs:
      - TriggerEnvelopeV2, CheckpointV1, HealthReportV1, and RunManifestV3.
      - State migrations with fail-closed newer-version handling.
      - Reusable production workflow and authoritative matrix.
      - Recovery sweep, retry classes, alerts, and external dead-man signal.
    acceptance_checks:
      - Kill-and-resume passes at every checkpoint.
      - Duplicate delivery creates one logical execution and one effect.
      - State outage blocks effects and LLM calls.
      - Every accepted trigger becomes terminal or visibly retryable.
    verification:
      - Checkpoint fault-injection suite.
      - Workflow reproduction with act.
      - State outage and duplicate-delivery integration tests.
    negative_controls:
      - No fallback to local/best-effort state in a GitHub profile.
      - One repository failure cannot cancel unrelated matrix repositories.
    regression_checks:
      - Full official checks.
      - Existing state CAS and lease tests.
    evidence_requirements:
      - One evidence bundle per injected checkpoint failure.
      - Health report showing stale lease, backlog, and recovery.
    rollback_or_recovery: Versioned migration rollback with old schema retained read-only.
    failure_reroute: Repair schema, then state CAS, then workflow consumer boundaries independently.
    closeout_rules:
      - All Wave 2 exit gates pass.
      - Recovery is proven in production-like execution.

  - task_id: L8-WAVE3-PRODUCT-TRUTH-OWNERSHIP
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Make every technical presentation claim provenance-complete and ownership-safe
    source_audit_finding: Product facts are partial and do not yet gate every claim or surface.
    audit_classification: partially_done
    priority: P0
    lane: facts-and-ownership
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Implement ProductFactsV2, precedence/conflict behavior, claim citations, surface ownership,
      protected-content fingerprints, isolated example execution, and prompt-injection treatment.
    why_it_matters: Presentation quality without factual provenance can confidently publish falsehoods.
    allowed_paths:
      - src/readme_agent/
      - tests/
      - config/policies/
      - docs/
      - plans/investigations/evidence/
    forbidden_paths:
      - config/authorization/
      - target repository remotes
    dependencies:
      - L8-WAVE2-RESTARTABLE-ACTIONS-RUNTIME
    expected_outputs:
      - ProductFactsV2 and migrations.
      - Fact precedence, conflict, and dependent-action gating.
      - Surface ownership map and protected-content fingerprints.
      - Secret-free isolated example and acquisition verification.
    acceptance_checks:
      - False Maven coordinates cannot enter a verified proposal.
      - Missing facts block only dependent actions.
      - Removing a protected limitation, command, or example fails validation.
    verification:
      - False-coordinate and conflicting-fact negative controls.
      - Isolated real package/example execution.
      - Prompt-injection fixtures.
    negative_controls:
      - README prose is never accepted as authoritative truth by itself.
      - Package execution never has a write token.
    regression_checks:
      - Existing facts-hash and prompt-hash tests.
      - Full official checks.
    evidence_requirements:
      - Fact provenance graph for representative repositories.
      - Protected-content loss rejection evidence.
    rollback_or_recovery: Preserve ProductFactsV1 migration reader until all state is upgraded.
    failure_reroute: Block only the affected surface and continue independent fact/surface audits.
    closeout_rules:
      - All Wave 3 exit gates pass.
      - Independent factuality reviewer accepts representative facts.

  - task_id: L8-WAVE4-PRESENTATION-INTELLIGENCE
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Produce repository-specific, source-span presentation plans across owned surfaces
    source_audit_finding: >-
      Current presentation logic covers only a subset of the ten standard dimensions and surfaces.
    audit_classification: partially_done
    priority: P1
    lane: presentation-intelligence
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Implement RepositoryPresentationPlanV1, AST/source-span README patches, archetype-specific
      intelligence, metadata/community/visual proposals, ownership constraints, and governed golden
