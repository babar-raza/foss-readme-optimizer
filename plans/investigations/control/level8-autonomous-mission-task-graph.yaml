    expected_outputs:
      - RepositoryPresentationPlanV1.
      - markdown-it-py direct dependency and source-span patcher.
      - Ten-dimension README intelligence with differentiated archetypes.
      - Complete controlled-surface proposal support.
      - Golden set of at least 100 evaluations.
    acceptance_checks:
      - Deterministic validators pass 100 percent.
      - Agentic plan selection reaches at least 95 percent in three sessions.
      - No unsupported claim, template clone, protected loss, or ownership violation passes.
    verification:
      - Real regression fixtures and all named ecosystems/archetypes.
      - Three independent golden-set sessions.
      - Reviewer acceptance without prose repair.
    negative_controls:
      - Social preview is never claimed applied by asset preparation.
      - Releases, packages, and GitHub-generated signals remain audit-only.
    regression_checks:
      - Byte-preservation tests outside source spans.
      - Full official checks.
    evidence_requirements:
      - Golden-set raw results and route-disable proof.
      - Before/after patch byte comparison.
    rollback_or_recovery: Disable any model route falling below threshold; deterministic audits remain.
    failure_reroute: Split by surface and archetype while preserving shared fact/ownership gates.
    closeout_rules:
      - All Wave 4 exit gates pass.
      - Independent reviewers accept repository-specific proposals.

  - task_id: L8-WAVE5-VERIFIED-PROPOSAL-LIFECYCLE
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Complete verified proposal, draft-PR, drift, and reconciliation lifecycle
    source_audit_finding: >-
      The existing PR capability lacks the complete VerifiedProposalV1/OpenProposalV2 lifecycle,
      drift rebuilding, and crash-boundary reconciliation required by the target.
    audit_classification: partially_done
    priority: P0
    lane: proposal-effects
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Separate verified proposal construction from terminal authorized effects and prove exactly-one
      draft PR behavior across retries, drift, crashes, and authorization expiry.
    why_it_matters: A safe proposal system must never turn stale analysis into duplicate effects.
    allowed_paths:
      - src/readme_agent/
      - tests/
      - .github/workflows/
      - docs/
      - plans/investigations/evidence/
    forbidden_paths:
      - target repository default branches
      - package and release endpoints
      - config/authorization/
    dependencies:
      - L8-WAVE4-PRESENTATION-INTELLIGENCE
    expected_outputs:
      - VerifiedProposalV1 and OpenProposalV2.
      - One agent-owned branch per repository with fast-forward-only updates.
      - Drift rebuild and re-verification.
      - Crash-boundary and lost-response reconciliation.
      - Fresh GitHub App token isolated to the effect job.
    acceptance_checks:
      - All named lifecycle scenarios produce exactly one correct proposal state.
      - Missing or expired authorization blocks before pending effect creation.
      - No write token exists in clone, LLM, package, or validation jobs.
    verification:
      - Local bare-remote lifecycle tests.
      - Live authorized draft-PR pilot only when a reviewed record exists.
      - Credential-boundary workflow inspection and negative tests.
    negative_controls:
      - No PAT or GH_TOKEN production fallback.
      - No force push, ready-for-review, merge, close, or default-branch write.
    regression_checks:
      - Existing effect-ledger and PR dedup tests.
      - Full official checks.
    evidence_requirements:
      - Per-scenario proposal state and remote observation.
      - Token-exposure audit.
    rollback_or_recovery: Close or supersede only through separately authorized lifecycle actions.
    failure_reroute: Continue proposal generation in no-effect mode while authorization is unavailable.
    closeout_rules:
      - All Wave 5 exit gates pass.
      - Independent verifier reproduces exactly-one behavior.

  - task_id: L8-WAVE6-CONTROLLED-JAVA-PILOT
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Prove Level 5 across the governed three-repository Java pilot
    source_audit_finding: No complete independently reproducible PIL-013 bundle exists.
    audit_classification: not_attempted
    priority: P1
    lane: java-pilot
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Execute the full baseline, facts, plan, surfaces, verified draft PR, rerun, overwrite,
