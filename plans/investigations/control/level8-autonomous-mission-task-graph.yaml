    acceptance_checks:
      - Every required repository/surface/scenario has terminal evidence.
      - Draft PRs are independently verified and remain unmerged.
      - Reviewer accepts without manual prose repair.
    verification:
      - Live governed pilot.
      - Read-only remote reconciliation.
      - Bundle checksum reproduction.
    negative_controls:
      - The pilot is called controlled Java, never heterogeneous.
      - No write occurs without a reviewed authorization record.
    regression_checks:
      - Full official checks before and after pilot.
      - Immediate unchanged reruns.
    evidence_requirements:
      - PIL-013 checksum-complete committed evidence bundle.
      - Independent reviewer identity and verdict.
    rollback_or_recovery: Revert agent branch commits or close drafts only under explicit authorization.
    failure_reroute: Continue read-only and proposal-local scenarios while a repository write is blocked.
    closeout_rules:
      - All Wave 6 pilot obligations pass.
      - Level 5 is awarded by independent review.

  - task_id: L8-WAVE7-HETEROGENEOUS-PORTFOLIO
    mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
    parent_task_id: null
    title: Reach Levels 6 and 7 across the complete heterogeneous portfolio
    source_audit_finding: >-
      Existing production-like evidence is concentrated in Java and does not cover a full proposal
      lifecycle in seven ecosystems or every active registry repository.
    audit_classification: not_attempted
    priority: P1
    lane: heterogeneous-rollout
    owner: readme-agent-supervisor
    status: TODO
    objective: >-
      Prove observe/proposal mode for the full registry, then one authorized representative per
      Java, .NET, Python, TypeScript, C++, Go, and Rust, followed by 30 clean production days.
    why_it_matters: Level 7 is a portfolio property, not a three-Java-repository test count.
    allowed_paths:
      - runs/
      - plans/investigations/evidence/
      - tests/integration/
      - target agent-owned presentation branches under valid authorization
