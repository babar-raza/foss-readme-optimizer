schema_version: 1
autonomous_execution_contract:
  selected_mechanism: readme-agent-supervisor
  mechanism_type: autonomous_supervision
  entry_point: readme-agent supervise
  invocation: >-
    .venv/Scripts/readme-agent supervise
    --mission-task-graph plans/investigations/control/level8-autonomous-mission-task-graph.yaml
  governing_state: >-
    Versioned mission state persisted by the supervisor; the committed task graph is the
    declarative source and audit record.
  task_source: plans/investigations/control/level8-autonomous-mission-task-graph.yaml
  continuation_source: dependency-ready taskcards in this graph
  continuation_consumer: readme-agent supervisor mission controller
  stop_evaluator: mission-aware supervisor task-graph evaluator
  resume_strategy: >-
    Reload the same task graph and versioned mission state, reconcile claimed work, and claim the
    highest-priority dependency-ready task.
  rejected_alternative: repository autonomous cycling mechanism
  mechanism_locked: true

mission_authority:
  mission_id: LEVEL8-CENTRAL-REPOSITORY-PRESENTATION
  mission_summary: >-
    Implement and verify the Level-8 Central Repository-Presentation System incrementally through
    the repository's sole production supervisor, preserving the existing safety, registry,
    validation, state, specialist, and evidence foundations.
  governing_plan_path: plans/master.md
  current_phase: Wave 0 - truth consolidation and shippable baseline
  in_scope_outcomes:
    - One canonical production supervisor and no alternate mutation path.
    - Restartable GitHub Actions runtime with durable lifecycle recovery.
    - Provenance-complete product facts and surface ownership.
    - Repository-specific presentation intelligence across controlled surfaces.
    - Verified proposal and authorized draft-PR effect lifecycle.
    - Controlled three-repository Java pilot.
    - Heterogeneous seven-ecosystem production portfolio.
    - Ninety-day independently reproducible Level-8 production proof.
  out_of_scope_items:
    - Automatic merge or default-branch writes.
    - Package or release publication.
    - Writes to GitHub-generated surfaces.
    - Unreviewed onboarding into write-enabled operation.
  mandatory_acceptance_criteria:
    - Every accepted trigger is terminal or visibly retryable or blocked.
    - No unauthorized, duplicate, default-branch, package, release, or generated-surface write.
    - No false-success terminal state.
    - Every terminal run has a checksum-complete manifest.
    - Deterministic validation remains at 100 percent.
    - Agentic golden-set accuracy is at least 95 percent across the governed evaluation set.
    - Level 7 has 30 consecutive production days meeting its gates.
    - Level 8 has 90 consecutive production days meeting its gates.
    - An independent audit reproduces the evidence and awards Level 8.
  conflicts_found:
    - >-
      plans/master.md still contains the obsolete phase track and requires a fresh section-specific
      approval before structural edits.
    - >-
      Uncommitted plans/status.md, plans/roadmap.md, and plans/changelog.md are not currently listed
      as allowed plan homes by plans/GOVERNANCE.md.
    - >-
      The production supervisor owns product-repository capability tasks but has no consumer for
      central-repository implementation taskcards.
    - >-
      Requirement closure prose and current repository evidence contain semantic contradictions,
      including VER-001 and the still-live alternate mutation path.
  mission_locked: true

