schema_version: 2
policy_profile: aspose-font-foss-python
required_elements:
  license_mentioned:
    detected_license: MIT
  products_org_link:
    url: https://products.aspose.org/font/python/
    family_url: https://products.aspose.org/font/
    label: Aspose.Font FOSS for Python
  products_com_link:
    url: https://products.aspose.com/font/
    family_url: https://products.aspose.com/font
    label: Aspose.Font for Python
    utm:
      utm_source: github
      utm_medium: readme
      utm_campaign: foss-readme-optimizer
  relationship_explained:
    min_sentences: 2
    talking_points:
    - open_source_scope
    - commercial_upgrade_path
secondary_links:
- docs.aspose.org
- docs.aspose.com
- reference.aspose.com
- releases.aspose.com
- blog.aspose.org
- kb.aspose.org
- forum.aspose.com
block:
  word_limit:
    min: 20
    max: 120
  prohibited_terms:
  - guarantee
  - 100%
  - best in the world
  - free forever
  - no bugs
  link_whitelist_domains:
  - products.aspose.com
  - docs.aspose.com
  - reference.aspose.com
  - releases.aspose.com
  - products.aspose.org
  - docs.aspose.org
  - kb.aspose.org
  - blog.aspose.org
  - forum.aspose.com
