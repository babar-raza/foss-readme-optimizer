schema_version: 2
policy_profile: aspose-cells-foss-net
required_elements:
  license_mentioned:
    detected_license: MIT
  products_org_link:
    url: https://products.aspose.org/cells/net/
    family_url: https://products.aspose.org/cells/
    label: Aspose.Cells FOSS for .NET
  products_com_link:
    url: https://products.aspose.com/cells/net/
    family_url: https://products.aspose.com/cells
    label: Aspose.Cells for .NET
