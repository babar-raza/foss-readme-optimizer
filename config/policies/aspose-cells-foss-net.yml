    min_sentences: 2
    talking_points:
    - open_source_scope
    - commercial_upgrade_path
secondary_links:
- docs.aspose.org
- docs.aspose.com
- reference.aspose.com
- releases.aspose.com
- blog.aspose.org
- kb.aspose.org
- forum.aspose.com
