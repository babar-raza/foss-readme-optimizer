schema_version: 2
policy_profile: aspose-cells-foss

required_elements:
  license_mentioned:
    # GitHub's license classifier reports null for this repo (non-standard
    # License/LICENSE.txt path) but the repo's own README states MIT — use that
    # ground truth, never invent a license. See license/auditor.py.
    detected_license: MIT
  products_org_link:
    url: "https://products.aspose.org/cells/java/"
    family_url: "https://products.aspose.org/cells/"
    label: "Aspose.Cells FOSS for Java"
  products_com_link:
    url: "https://products.aspose.com/cells/java/"
    family_url: "https://products.aspose.com/cells"
    label: "Aspose.Cells for Java"
    utm:
      utm_source: github
      utm_medium: readme
      utm_campaign: foss-readme-optimizer
  relationship_explained:
    min_sentences: 2
    talking_points: [open_source_scope, commercial_upgrade_path]

secondary_links:
  - docs.aspose.org
  - docs.aspose.com
  - reference.aspose.com
  - releases.aspose.com
  - blog.aspose.org
  - kb.aspose.org
  - forum.aspose.com

block:
  word_limit:
    min: 20
    max: 120
  prohibited_terms:
    - "guarantee"
    - "100%"
    - "best in the world"
    - "free forever"
    - "no bugs"
  link_whitelist_domains:
    - products.aspose.com
    - docs.aspose.com
    - reference.aspose.com
    - releases.aspose.com
    - products.aspose.org
    - docs.aspose.org
    - kb.aspose.org
    - blog.aspose.org
    - forum.aspose.com
