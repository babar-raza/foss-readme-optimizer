name: README Agent Supervise (dry-run)

# Wave 6 (decision #39): the first CI entry point for `supervise` (only
# `run`/`run-registry` had one before). `workflow_dispatch` only, no
# `schedule:` -- deliberately deferred (BACKLOG, extends RUN-002) until this
# has been run live against the real enabled pilots and correctly reports
# both convergence tiers, per GOVERNANCE.md rule 10 ("prove it in production
# before automating") and decision #24's pilot-first posture.
on:
  workflow_dispatch:
    inputs:
      repo_key:
        description: "org/repo (must exist in data/products.json)"
        required: true
        type: string

permissions:
  contents: read

# Wave 8.5 (SCL-005 extension): the SAME literal group-key string as
# readme-agent-run.yml and readme-agent-portfolio.yml for the same repo, so
# a manual dispatch here and a concurrent scheduled/manual run for the same
# repo queue against each other rather than race -- GitHub Actions
# concurrency groups match by string value across workflow files, not
# per-file. cancel-in-progress: false queues, never cancels a legitimate
# in-flight run -- a second, CI-level layer, complementary to (not a
# duplicate of) the in-process run-lock (state/git_backend.py::
# acquire_run_lock()).
concurrency:
  group: readme-agent-${{ inputs.repo_key }}
  cancel-in-progress: false

jobs:
  supervise:
    runs-on: ubuntu-latest
    # Same least-privilege scoping as readme-agent-run.yml: this job's own
    # GITHUB_TOKEN needs to push only to this repo's own
    # refs/readme-agent-state/... refs (state/git_backend.py), never a
    # target repo -- supervise_repo() itself never pushes to the repo it
    # observes (push-blocked work clone, same as `run`/`generate`).
    # pull-requests: write exists only for the registry self-heal PR step
    # below (CORE-034) -- still never a push to main, and never a target repo.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      # Wave 9.4: explicit `--execution-profile github_proposal` -- this workflow's own
      # `pull-requests: write` permission and durable-state requirement match the proposal
      # profile exactly (local_write/remote_write allowed, evidence+verification required,
      # fails closed on any durable-state trouble). Superseded reliance on `--durable-state`
      # alone: the profile now forces durable state itself even if this flag were ever dropped.
      - run: readme-agent supervise --repo "${{ inputs.repo_key }}" --durable-state --execution-profile github_proposal
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      - id: safe_repo_key
        run: echo "value=$(echo '${{ inputs.repo_key }}' | sed 's#/#__#')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: "supervise-evidence-${{ steps.safe_repo_key.outputs.value }}"
          path: runs/evidence/
      # CORE-034: if the supervise-time registry self-heal changed
      # data/products.json on this ephemeral runner, surface it as a PR --
      # never a push to main (OPS-008 posture). Deliberately the SAME branch
      # as update-products-registry.yml's weekly PR so a runtime-heal diff
      # and the weekly cron diff dedupe into one open PR instead of twins.
      # The action no-ops when the file is unchanged.
      - name: Open a PR if the registry self-healed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): registry self-heal from supervise run"
          title: "chore(data): refresh products registry from GitHub"
          body: >
            A `readme-agent supervise` run self-healed registry drift (CORE-034):
            newly discovered repos are added with `mode: "disabled"` — enabling one still
            requires a manual change per `docs/policy-authoring.md`. No repo is ever removed.
          branch: chore/update-products-registry
          delete-branch: true
          add-paths: data/products.json
