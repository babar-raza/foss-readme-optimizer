name: README Agent Run (compatibility/diagnostic -- not the primary production path)

# Wave 9.4 (execution profiles): decision #46 already adopted `supervise` as the sole pilot path
# and `run` as compatibility-only doctrine; this workflow's name/description now says so
# structurally, not just in a decision-ledger paragraph. It deliberately keeps invoking the
# legacy `run` engine (not `supervise --execution-profile ...`) -- that is this workflow's own
# job: proving the compatibility path still works, not exercising production behavior. New
# production traffic goes through readme-agent-supervise.yml/readme-agent-portfolio.yml, both on
# `supervise --execution-profile ...`.
on:
  workflow_dispatch:
    inputs:
      repo_key:
        description: "org/repo (must exist in data/products.json)"
        required: true
        type: string
      mode:
        description: "Run mode"
        required: false
        default: "dry_run"
        type: choice
        options:
          - dry_run

permissions:
  contents: read

# Wave 8.5 (SCL-005 extension): the SAME literal group-key string as
# readme-agent-supervise.yml and readme-agent-portfolio.yml for the same
# repo, so a manual dispatch here and a concurrent scheduled/manual
# supervise run for the same repo queue against each other rather than
# race -- GitHub Actions concurrency groups match by string value across
# workflow files, not per-file. cancel-in-progress: false queues, never
# cancels a legitimate in-flight run -- a second, CI-level layer,
# complementary to (not a duplicate of) the in-process run-lock
# (state/git_backend.py::acquire_run_lock()).
concurrency:
  group: readme-agent-${{ inputs.repo_key }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Wave 4 (`MEM-*`): this job's own `GITHUB_TOKEN` needs to push to this
    # repo's own `refs/readme-agent-state/...` refs -- state/git_backend.py's
    # durable-state backend, never a target repo. Scoped to the job that
    # needs it, mirroring update-products-registry.yml's existing
    # least-privilege override pattern rather than a blanket repo-level grant.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: readme-agent run --repo "${{ inputs.repo_key }}" --mode dry_run --durable-state
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      # Artifact names can't contain "/" (GitHub Actions API constraint,
      # confirmed live via RUN-003's `act` reproduction: `inputs.repo_key`
      # is always "org/repo" and upload-artifact rejected it outright) --
      # sanitized to this project's own `{org}__{repo}` convention
      # (paths.py, state/git_backend.py's ref naming), not invented fresh.
      - id: safe_repo_key
        run: echo "value=$(echo '${{ inputs.repo_key }}' | sed 's#/#__#')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: "evidence-${{ steps.safe_repo_key.outputs.value }}"
          path: runs/evidence/
