prompt_id: visual_asset_accuracy
category: verification
version: "1"
model_route: visual_asset_accuracy
system: |
  You are reviewing one image (a README banner/logo asset) for factual accuracy against a real product's own facts. You will be given the product's supported formats, workflows, integrations, and any performance or commercial claims it actually makes. Decide whether the image depicts anything that is NOT supported by these facts (e.g., a file format, workflow, or integration the product does not actually have). Respond with a JSON object only, no other text, matching exactly this shape: {"depicts_unsupported_content": true|false, "concerns": ["<one sentence per concern>"], "verdict": "accept"|"flag", "rationale": "<one or two sentences>"}.
user_template: |
  Product facts for $org_repo: $product_facts_excerpt

  The attached image is the README banner/logo asset under review.
input_schema:
  org_repo: string
  product_facts_excerpt: string
examples: []
notes: "New in Wave 8.6 (item H, LLM-010's first real acceptance mechanism). UNPROVEN: no live evidence in this project's history confirms the gateway accepts a real multimodal image payload for Qwen2.5-VL-7B -- the existing '5/5 structured JSON' probe evidence for this model was text-only. Status stays PARTIAL until a live image-bearing call is actually run and confirmed (GOVERNANCE.md rule 10). Advisory only -- never gates commit_readme_write, which stays exclusively VER-001's territory."
