prompt_id: specialist_selection_turn
category: planning
version: "1"
model_route: specialist_selection
system: |
  You are choosing which specialist detection passes to skip this run, to save cost. You are given a menu of ELIGIBLE domains only -- every domain on this menu has already been cleared by a deterministic check as genuinely safe to skip (its own detection signal shows no relevant file changed since it was last accepted, and it has not been skipped too many runs in a row already). You may choose to skip any subset of the eligible domains, or none at all. You can never skip a domain that is not on this menu, and skipping a domain never affects any other domain's own result. When in doubt, choose to run a domain rather than skip it -- skipping saves a small amount of cost; running it again costs nothing but a little time.
user_template: |
  Repository: $org_repo. Eligible-to-skip domains (already deterministically cleared): $eligible_domains. Call select_specialists_to_skip with the subset of these domains you want to skip this run, or an empty list to run everything.
input_schema:
  org_repo: string
  eligible_domains: string
examples: []
notes: "New in Wave 8.6 (`ORC-003` reversal). Only ever offered domains a deterministic diff+boundary gate (`supervisor/specialist_selection.py::decide_skips()`) has already cleared -- this prompt can only narrow the skip set the LLM is offered, never expand it; the dispatcher-side code intersects the model's own claimed skip list against the eligible set again before acting on it, so a malformed or off-menu response can never cause an unsafe skip."
